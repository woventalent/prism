name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'EOF'
          ${{ secrets.DEPLOY_KEY }}
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keygen -l -f ~/.ssh/deploy_key.pub 2>/dev/null || echo "Note: Public key not found (expected)"

      - name: Deploy to server
        run: |
          ssh -v -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOFSCRIPT'
          set -e
          cd /var/www/rcc
          git pull origin master
          cd client && npm run build
          cd ..
          pm2 restart rcc-api --update-env
          echo "Deploy complete at $(date)"
          EOFSCRIPT
