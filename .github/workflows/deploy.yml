name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Key file info:"
          file ~/.ssh/deploy_key
          echo "Key file head:"
          head -c 100 ~/.ssh/deploy_key
          echo ""
          echo "SSH client version:"
          ssh -V

      - name: Deploy to server
        run: |
          ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=$HOME/.ssh/known_hosts ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOFSCRIPT'
          set -e
          cd /var/www/rcc
          git pull origin master
          cd client && npm run build
          cd ..
          pm2 restart rcc-api --update-env
          echo "Deploy complete at $(date)"
          EOFSCRIPT
