version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rcc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rcc_db
      POSTGRES_USER:     rcc_user
      POSTGRES_PASSWORD: rcc_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rcc_server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT:          4000
      DATABASE_URL:  postgresql://rcc_user:rcc_pass@postgres:5432/rcc_db
      JWT_SECRET:    change_me_in_production_use_a_long_random_string
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: rcc_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  pgdata:
